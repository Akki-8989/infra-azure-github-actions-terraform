name: Terraform Validate

on:
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-validate.yml'
      - '.github/workflows/terraform-deploy-azure.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
          terraform_wrapper: false

      - name: Terraform Fmt Check
        run: terraform -chdir=terraform/${{ matrix.component }} fmt -check

      - name: Terraform Init (Validation Mode)
        run: terraform -chdir=terraform/${{ matrix.component }} init -backend=false -input=false -upgrade=false

      - name: Terraform Validate
        run: terraform -chdir=terraform/${{ matrix.component }} validate
